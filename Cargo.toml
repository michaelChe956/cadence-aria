[package]
name = "cadence-aria"
version = "0.1.0"
edition = "2024"
rust-version = "1.95.0"

[lib]
name = "cadence_aria"
path = "src/lib.rs"

[[bin]]
name = "aria"
path = "src/main.rs"

[dependencies]
anyhow = "1.0.102"
chrono = { version = "0.4.44", features = ["clock", "serde"] }
hex = "0.4.3"
pulldown-cmark = "0.13.3"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
sha2 = "0.10.9"
thiserror = "2.0.18"
tokio = { version = "1.52.1", features = ["fs", "io-util", "macros", "net", "process", "rt-multi-thread", "sync", "time"] }
uuid = { version = "1.23.1", features = ["v4"] }

[dev-dependencies]
serde_yaml = "0.9.34"
tempfile = "3.27.0"
